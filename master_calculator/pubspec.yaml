name: master_calculator
description: "A professional multi-purpose calculator application built with Flutter."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Auth
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  google_sign_in: ^6.2.1

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2


  # Utilities
  intl: ^0.19.0
  math_expressions: ^2.5.0

  # Sharing & Screenshot
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Tool to generate App Launcher Icons
  flutter_launcher_icons: ^0.13.1

# Configuration for App Icon (Updated to match your path)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # Registering Assets as a LIST (Fixed)
  assets:
    - assets/logo/logoo.jpeg